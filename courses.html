<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet"
          href="assets/css/style.css">
</head>

<body>

    <div class="container">

        <a class="navbar-brand"
            href="index.html">
        <img src="assets/images/LOGO.png"
             alt="Logo"
             width="60"
             height="60">

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

        <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">
            <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="index.html">
                    Trang chủ
                 </a>
                </li>

                <li class="nav-item">
                <a class="nav-link active"
                    href="courses.html">
                    Workshop
                </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                    href="register.html">
                    Đăng ký
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                    href="registrations.html">
                    Danh sách đăng ký
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>
<main class="container py-5">

    <h1 class="text-center mb-4">
        Danh Sách Workshop
    </h1>
    <div class="filter-box mb-4">

        <div class="row g-3">

            <div class="col-lg-4">

                <input type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Tìm workshop...">

            </div>

            <div class="col-lg-3">

                <select id="categoryFilter"
                        class="form-select">

                    <option value="">
                        Tất cả danh mục
                    </option>

                    <option value="Công Nghệ">
                        Công Nghệ
                    </option>

                    <option value="Thiết Kế">
                        Thiết Kế
                    </option>

                    <option value="Nghề Nghiệp">
                         Nghề Nghiệp        
                    </option>

                    <option value="Kỹ Năng Mềm">
                         Kỹ Năng Mềm    
                    </option>

                </select>

            </div>

            <div class="col-lg-3">

                <select id="levelFilter"
                        class="form-select">

                    <option value="">
                        Tất cả cấp độ
                    </option>

                    <option value="Cơ bản">
                         Cơ bản  
                    </option>

                    <option value="Trung Bình">
                        Trung Bình
                    </option>

                    <option value="Nâng Cao">
                         Nâng Cao
                    </option>

                </select>

            </div>

                <div class="col-lg-2">
                    <button id="resetBtn"
                         class="btn btn-primary w-100">
                        Đặt lại

                </button>

            </div>

        </div>

    </div>
<div class="row"
         id="courseList">

    </div>

</main>
<div class="modal fade"
     id="courseModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title"
                    id="modalTitle">
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <img id="modalImage"
                     class="img-fluid mb-3"
                     alt="">

                <p id="modalDetail"></p>

                <p>
                    <strong>Danh mục:</strong>
                    <span id="modalCategory"></span>
                </p>

                <p>
                    <strong>Cấp độ:</strong>
                    <span id="modalLevel"></span>
                </p>

                <p>
                    <strong>Ngày tổ chức:</strong>
                    <span id="modalDate"></span>
                </p>

            </div>

            <div class="modal-footer">

                <a href="register.html"
                   class="btn btn-primary">

                    Đăng ký ngay

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
