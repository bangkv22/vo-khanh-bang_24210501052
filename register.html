<main class="container py-5">

    <h1 class="text-center mb-4">
        Đăng Ký Workshop
    </h1>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="form-container">

                <form id="registerForm">

                    <div class="mb-3">

                        <label class="form-label">
                            Họ và tên
                        </label>

                        <input type="text"
                               id="fullName"
                               class="form-control">

                        <div id="nameError"
                             class="error">
                        </div>

                    </div>
            
                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>
                        
                        <input type="email"
                               id="email"
                               class="form-control">

                        <div id="emailError"
                             class="error">
                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Số điện thoại
                        </label>

                        <input type="text"
                               id="phone"
                               class="form-control">

                        <div id="phoneError"
                             class="error">
                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Lớp
                        </label>

                        <input type="text"
                               id="className"
                               class="form-control">

                        <div id="classError"
                             class="error">
                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Chọn Workshop
                        </label>

                        <select id="courseSelect"
                                class="form-select">

                            <option value="">
                                -- Chọn Workshop --
                            </option>

                        </select>

                        <div id="courseError"
                             class="error">
                        </div>


                    </div>

                    <div class="mb-3">

                    <label class="form-label">
                            Ghi chú
                    </label>

                    <textarea
                            id="note"
                            class="form-control"
                            rows="3"
                            placeholder="Nhập ghi chú nếu có">
                    </textarea>

                    </div>
                    
                    <button type="submit"
                            class="btn btn-primary">

                        Đăng Ký Ngay

                    </button>

                </form>

            </div>

        </div>

    </div>
